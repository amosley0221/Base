<style>
  .notes-board { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .ncard { padding: 22px; display: flex; flex-direction: column; gap: 12px; transition: box-shadow 0.3s var(--ease); }
  .ncard:focus-within { box-shadow: var(--shadow-lg); }
  .ncard .ntitle { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.01em; border: none; background: none; width: 100%; padding: 0; }
  .ncard .ntitle:focus { outline: none; }
  .ncard .nbody { border: none; background: none; resize: vertical; min-height: 120px; font-size: 15px; line-height: 1.55; color: var(--ink-soft); width: 100%; padding: 0; }
  .ncard .nbody:focus { outline: none; }
  .ncard .nfoot { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--edge-soft); padding-top: 12px; margin-top: auto; }
  .ncard.is-red { background: var(--red); color: #fff; border-color: transparent; }
  .ncard.is-red .ntitle, .ncard.is-red .nbody { color: #fff; }
  .ncard.is-red .nbody::placeholder, .ncard.is-red .ntitle::placeholder { color: rgba(255,255,255,0.6); }
  .ncard.is-red .nfoot { border-color: rgba(255,255,255,0.25); }
  .swap { display: flex; gap: 7px; }
  .swap button { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--edge); cursor: pointer; padding: 0; }
  .swap .sw-paper { background: var(--paper); }
  .swap .sw-red { background: var(--red); border-color: var(--red); }
  .ncard.is-red .swap button { border-color: rgba(255,255,255,0.5); }
  .add-note { border: 1.5px dashed var(--edge); background: transparent; border-radius: 20px; min-height: 200px; display: grid; place-items: center; cursor: pointer; color: var(--ink-faint); font-size: 15px; transition: all 0.25s var(--ease); }
  .add-note:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
